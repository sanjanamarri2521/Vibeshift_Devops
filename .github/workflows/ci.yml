name: VibeShift Continuous Integration

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  check-and-build:
    name: Lint, Format & Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Prettier Format Check
        run: npm run format:check

      - name: Next.js ESLint Check
        run: npm run lint

      - name: Build Verification
        run: npm run build
